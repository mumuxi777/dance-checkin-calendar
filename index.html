<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>打卡日历</title>
<meta name="description" content="可自定义类型和颜色的打卡日历">
<meta name="theme-color" content="#FF7FA0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="打卡日历">
<style>
  :root {
    --bg: #FFF8F3;
    --bg-pattern: #FFEDF1;
    --surface: #FFFFFF;
    --surface-alt: #FFF3F5;
    --ink: #4A3F4E;
    --ink-soft: #948892;
    --ink-faint: #C8BCC4;
    --border: #F5DEE3;
    --accent: #FF7FA0;
    --accent-ink: #FFFFFF;

    --shadow: 0 1px 2px rgba(180, 120, 140, 0.08), 0 6px 16px rgba(180, 120, 140, 0.10);
    --shadow-sm: 0 1px 3px rgba(180, 120, 140, 0.12);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }

  /* ---- Color skins: each one fully defines its own look ---- */
  [data-skin="pink-blue"] {
    --bg: #F5FAFE; --bg-pattern: #FFE9F0;
    --surface: #FFFFFF; --surface-alt: #EAF4FD;
    --ink: #3E4650; --ink-soft: #8B96A3; --ink-faint: #C9D3DD;
    --border: #DCEBF8;
    --accent: #FF6FA3; --accent-ink: #FFFFFF;
  }
  [data-skin="lavender"] {
    --bg: #FAF7FE; --bg-pattern: #F1E9FB;
    --surface: #FFFFFF; --surface-alt: #F3ECFC;
    --ink: #473F55; --ink-soft: #9689A6; --ink-faint: #D6CBE6;
    --border: #E9DDF7;
    --accent: #A47FEA; --accent-ink: #FFFFFF;
  }
  [data-skin="mint"] {
    --bg: #F6FDFA; --bg-pattern: #E4F8EF;
    --surface: #FFFFFF; --surface-alt: #EAFBF2;
    --ink: #3B4A43; --ink-soft: #849A8F; --ink-faint: #CDE6D9;
    --border: #D7F2E4;
    --accent: #3FBE8C; --accent-ink: #FFFFFF;
  }
  [data-skin="peach"] {
    --bg: #FFFAF3; --bg-pattern: #FFF0DC;
    --surface: #FFFFFF; --surface-alt: #FFF4E5;
    --ink: #524238; --ink-soft: #A6907E; --ink-faint: #E9D2B7;
    --border: #FBE6C8;
    --accent: #FFA24D; --accent-ink: #3A2712;
  }
  [data-skin="midnight"] {
    --bg: #221C27; --bg-pattern: #271F2D;
    --surface: #2C2432; --surface-alt: #362B3C;
    --ink: #F5ECF2; --ink-soft: #B8A9BC; --ink-faint: #6E5F73;
    --border: #40333F;
    --accent: #FF8FAE; --accent-ink: #2A1A20;
    --shadow: 0 1px 2px rgba(0,0,0,0.25), 0 8px 20px rgba(0,0,0,0.35);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 8% 12%, var(--bg-pattern) 0%, transparent 40%),
      radial-gradient(circle at 92% 88%, var(--bg-pattern) 0%, transparent 40%),
      var(--bg);
    color: var(--ink);
    font-family: 'Segoe UI Rounded', 'SF Pro Rounded', ui-rounded, 'Segoe UI', -apple-system, 'Nunito', sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 18px 60px;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.25s ease;
  }

  .app {
    width: 100%;
    max-width: 620px;
    position: relative;
  }

  .masthead {
    text-align: center;
    margin-bottom: 26px;
  }

  .kicker {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin: 0 auto 6px;
    cursor: pointer;
    display: block;
    width: fit-content;
    padding: 2px 4px;
    border-radius: 6px;
  }
  .kicker:hover { background: var(--surface-alt); }

  .masthead h1 {
    font-size: clamp(26px, 5vw, 34px);
    margin: 0 auto;
    font-weight: 800;
    text-wrap: balance;
    letter-spacing: -0.01em;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 10px;
    display: block;
    width: fit-content;
  }
  .masthead h1:hover { background: var(--surface-alt); }

  .kicker input, .masthead h1 input {
    font: inherit;
    color: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 1px 4px;
    text-align: center;
    width: 12ch;
    max-width: 60vw;
  }
  .masthead h1 input { width: 9ch; border-radius: 8px; padding: 2px 6px; }

  .card {
    position: relative;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 22px 22px 20px;
    border: 1px solid var(--border);
    transition: background-color 0.2s ease, border-color 0.2s ease;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 10px;
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--surface-alt);
    color: var(--ink);
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, background 0.15s ease;
    flex: none;
  }
  .nav-btn:hover { background: var(--surface-alt); filter: brightness(0.96); transform: translateY(-1px); }
  .nav-btn:active { transform: translateY(0) scale(0.95); }
  .nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .month-title-wrap { text-align: center; }
  .month-title {
    font-size: 20px;
    font-weight: 800;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .today-link {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 0 0;
    letter-spacing: 0.02em;
  }
  .today-link:hover { text-decoration: underline; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin-bottom: 18px;
  }

  .legend-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    background: var(--surface-alt);
    color: var(--ink-soft);
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .legend-pill:hover { filter: brightness(0.97); }
  .legend-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: none;
  }
  .legend-add {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    background: none;
    color: var(--ink-faint);
    border: 1px dashed var(--ink-faint);
    cursor: pointer;
    font-family: inherit;
  }
  .legend-add:hover { color: var(--accent); border-color: var(--accent); }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekdays span {
    text-align: center;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    padding-bottom: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-cell {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-alt);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px 2px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    font-family: inherit;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
  }
  .day-cell:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
  .day-cell:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .day-cell.empty { visibility: hidden; cursor: default; }
  .day-cell.empty:hover { transform: none; box-shadow: none; }

  .day-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
  }

  .day-cell.today { box-shadow: 0 0 0 2px var(--accent) inset; }
  .day-cell.today .day-num { color: var(--accent); }

  .day-cell[data-cat] {
    background: color-mix(in srgb, var(--cat-color) 16%, var(--surface));
    border-color: color-mix(in srgb, var(--cat-color) 34%, var(--surface));
  }
  .day-cell[data-cat] .day-num { color: var(--cat-color); }
  .day-cell[data-cat] .day-tag { background: var(--cat-color); }

  .day-tag {
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.02em;
    padding: 1px 6px;
    border-radius: 999px;
    color: #fff;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Shared floating popover */
  .popover {
    position: absolute;
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 136px;
    animation: pop-in 0.12s ease-out;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.94) translateY(-2px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .popover button.cat-option {
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    padding: 8px 9px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    width: 100%;
  }
  .popover button.cat-option:hover { background: var(--surface-alt); }
  .popover .swatch {
    width: 10px; height: 10px; border-radius: 50%; flex: none;
  }
  .popover button.opt-clear { color: var(--ink-faint); border: none; background: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; text-align: left; border-top: 1px solid var(--border); border-radius: 0 0 8px 8px; margin-top: 2px; padding: 9px; width: 100%; }
  .popover button.opt-clear:hover { background: var(--surface-alt); color: var(--ink-soft); }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
  }

  /* Category editor popover */
  .cat-editor {
    min-width: 196px;
  }
  .cat-label-input {
    font: inherit;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 9px;
    margin-bottom: 8px;
    width: 100%;
  }
  .cat-label-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .cat-color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }
  .cat-color-swatch {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    padding: 0;
    position: relative;
  }
  .cat-color-swatch::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid transparent;
  }
  .cat-color-swatch.selected::after { border-color: var(--ink); }
  .cat-editor-footer {
    border-top: 1px solid var(--border);
    padding-top: 6px;
    margin-top: 2px;
  }
  .cat-delete {
    width: 100%;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 700;
    color: #E0607A;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    text-align: center;
  }
  .cat-delete:hover { background: var(--surface-alt); }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 8px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
  }
  .stat {
    text-align: center;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    background: var(--surface-alt);
  }
  .stat .stat-num {
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    display: block;
    line-height: 1.2;
  }
  .stat .stat-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .footnote {
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 16px;
  }

  .backup-row {
    text-align: center;
    margin-top: 8px;
  }
  .backup-row button {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 4px 6px;
  }
  .backup-row button:hover { color: var(--ink-soft); text-decoration: underline; }
  .backup-row .sep { color: var(--ink-faint); font-size: 11px; }

  /* Tucked-away theme switcher: small corner icon + popup menu */
  .theme-fab {
    position: absolute;
    top: -6px;
    right: 4px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    z-index: 22;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .theme-fab:hover { transform: translateY(-1px); color: var(--accent); }
  .theme-fab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .theme-menu {
    position: absolute;
    top: 32px;
    right: 4px;
    z-index: 22;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    padding: 6px;
    min-width: 150px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    animation: pop-in 0.12s ease-out;
  }
  .theme-option {
    display: flex;
    align-items: center;
    gap: 9px;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink);
    padding: 7px 8px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    width: 100%;
  }
  .theme-option:hover { background: var(--surface-alt); }
  .theme-option .swatch {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    flex: none;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55);
  }
  .theme-option .check {
    margin-left: auto;
    color: var(--accent);
    font-weight: 800;
    opacity: 0;
    font-size: 13px;
  }
  .theme-option.active .check { opacity: 1; }

  /* Custom confirm modal (native confirm()/alert() are blocked in sandboxed previews) */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30, 20, 25, 0.35);
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 20px;
    max-width: 300px;
    text-align: center;
    animation: pop-in 0.14s ease-out;
  }
  .modal-card p {
    margin: 0 0 16px;
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.55;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .modal-actions .btn-cancel { background: var(--surface-alt); color: var(--ink-soft); }
  .modal-actions .btn-confirm { color: #fff; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(8px);
    background: var(--ink);
    color: var(--surface);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    box-shadow: var(--shadow);
    z-index: 40;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    max-width: 80vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    .day-cell, .nav-btn, .popover, .theme-fab, .theme-menu, .modal-card, .toast { transition: none; animation: none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="masthead">
    <p class="kicker" id="kickerText" title="点击编辑">CHECK-IN LOG</p>
    <h1 id="titleText" title="点击编辑">打卡日历</h1>
  </div>

  <div class="card">
    <button class="theme-fab" id="themeFab" aria-label="选择配色" title="选择配色">&#127912;</button>

    <div class="month-nav">
      <button class="nav-btn" id="prevBtn" aria-label="上个月">&#8249;</button>
      <div class="month-title-wrap">
        <p class="month-title" id="monthTitle"></p>
        <button class="today-link" id="todayBtn">回到今天</button>
      </div>
      <button class="nav-btn" id="nextBtn" aria-label="下个月">&#8250;</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="weekdays">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="stats" id="stats"></div>
  </div>

  <p class="footnote">点击日期记录打卡类型 · 点类型标签可改名 / 换色 / 删除 · 数据仅保存在本机浏览器中</p>
  <div class="backup-row">
    <button id="exportBtn">导出备份</button>
    <span class="sep">·</span>
    <button id="importBtn">导入备份</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<script>
  const STORAGE_KEY = 'danceCheckinData';
  const SKIN_KEY = 'danceCheckinSkin';
  const CATS_KEY = 'danceCheckinCategories';
  const TITLE_KEY = 'danceCheckinTitle';
  const KICKER_KEY = 'danceCheckinKicker';

  const CATEGORY_COLORS = [
    '#FF7F9C', '#FF8C61', '#FFA24D', '#E0B23A',
    '#6FBF5A', '#4BC08B', '#3FA0E0', '#5B8DEF',
    '#9B7FE8', '#C775D1', '#E8607A', '#8B8894'
  ];

  const DEFAULT_CATEGORIES = [
    { id: 'jazz', label: 'Jazz', color: '#FF7F9C' },
    { id: 'hiphop', label: 'Hip-Hop', color: '#9B7FE8' },
    { id: 'allround', label: '全能', color: '#4BC08B' },
    { id: 'swim', label: '游泳', color: '#3FA0E0' }
  ];

  const SKINS = [
    { id: 'pink-white', label: '粉白', bg: '#FFF8F3', accent: '#FF7FA0' },
    { id: 'pink-blue', label: '粉蓝', bg: '#F5FAFE', accent: '#FF6FA3' },
    { id: 'lavender', label: '薰衣草紫', bg: '#FAF7FE', accent: '#A47FEA' },
    { id: 'mint', label: '薄荷绿', bg: '#F6FDFA', accent: '#3FBE8C' },
    { id: 'peach', label: '蜜桃橙黄', bg: '#FFFAF3', accent: '#FFA24D' },
    { id: 'midnight', label: '夜间紫', bg: '#221C27', accent: '#FF8FAE' }
  ];

  let data = {};
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch (e) { data = {}; }

  let categories = [];
  try { categories = JSON.parse(localStorage.getItem(CATS_KEY) || 'null') || DEFAULT_CATEGORIES.slice(); } catch (e) { categories = DEFAULT_CATEGORIES.slice(); }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function saveCategories() { localStorage.setItem(CATS_KEY, JSON.stringify(categories)); }

  // Native confirm()/alert() are blocked inside sandboxed previews, so use in-page equivalents everywhere.
  function customConfirm(message, danger) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const card = document.createElement('div');
      card.className = 'modal-card';
      const p = document.createElement('p');
      p.textContent = message;
      const actions = document.createElement('div');
      actions.className = 'modal-actions';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-cancel';
      cancelBtn.textContent = '取消';
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'btn-confirm';
      confirmBtn.style.background = danger ? '#E0607A' : 'var(--accent)';
      confirmBtn.textContent = '确定';
      const close = (result) => { overlay.remove(); resolve(result); };
      cancelBtn.addEventListener('click', () => close(false));
      confirmBtn.addEventListener('click', () => close(true));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(false); });
      actions.appendChild(cancelBtn);
      actions.appendChild(confirmBtn);
      card.appendChild(p);
      card.appendChild(actions);
      overlay.appendChild(card);
      document.body.appendChild(overlay);
    });
  }

  function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 250);
    }, 1800);
  }
  function findCategory(id) { return categories.find(c => c.id === id); }
  function genId() { return 'cat_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function nextColor() {
    const used = new Set(categories.map(c => c.color));
    return CATEGORY_COLORS.find(c => !used.has(c)) || CATEGORY_COLORS[categories.length % CATEGORY_COLORS.length];
  }

  // ---- Editable title / kicker ----
  function makeEditableText(displayEl, storageKey, maxLen) {
    const saved = localStorage.getItem(storageKey);
    if (saved) displayEl.textContent = saved;
    displayEl.addEventListener('click', () => {
      if (displayEl.querySelector('input')) return;
      const current = displayEl.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = current;
      input.maxLength = maxLen;
      const finish = (commit) => {
        const val = input.value.trim();
        displayEl.textContent = commit && val ? val : current;
        if (commit && val) localStorage.setItem(storageKey, val);
      };
      input.addEventListener('blur', () => finish(true));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { e.preventDefault(); finish(false); }
      });
      displayEl.textContent = '';
      displayEl.appendChild(input);
      input.focus();
      input.select();
    });
  }
  makeEditableText(document.getElementById('kickerText'), KICKER_KEY, 24);
  makeEditableText(document.getElementById('titleText'), TITLE_KEY, 16);

  // ---- Theme skin picker ----
  function applySkin(skinId) {
    document.documentElement.setAttribute('data-skin', skinId);
    localStorage.setItem(SKIN_KEY, skinId);
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.skin === skinId);
    });
  }

  function closeThemeMenu() {
    const menu = document.getElementById('themeMenu');
    if (menu) menu.remove();
    const overlay = document.querySelector('.theme-overlay');
    if (overlay) overlay.remove();
  }

  function openThemeMenu() {
    if (document.getElementById('themeMenu')) { closeThemeMenu(); return; }
    closePopover();

    const overlay = document.createElement('div');
    overlay.className = 'overlay theme-overlay';
    overlay.addEventListener('click', closeThemeMenu);
    document.querySelector('.card').appendChild(overlay);

    const menu = document.createElement('div');
    menu.className = 'theme-menu';
    menu.id = 'themeMenu';
    const currentSkin = document.documentElement.getAttribute('data-skin');

    SKINS.forEach(skin => {
      const opt = document.createElement('button');
      opt.type = 'button';
      opt.className = 'theme-option' + (skin.id === currentSkin ? ' active' : '');
      opt.dataset.skin = skin.id;
      opt.innerHTML = `<span class="swatch" style="background:linear-gradient(135deg, ${skin.bg} 50%, ${skin.accent} 50%)"></span>${skin.label}<span class="check">&#10003;</span>`;
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        applySkin(skin.id);
        closeThemeMenu();
      });
      menu.appendChild(opt);
    });

    document.querySelector('.card').appendChild(menu);
  }

  document.getElementById('themeFab').addEventListener('click', (e) => {
    e.stopPropagation();
    openThemeMenu();
  });

  applySkin(localStorage.getItem(SKIN_KEY) || 'pink-white');

  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth(); // 0-indexed

  const monthTitle = document.getElementById('monthTitle');
  const grid = document.getElementById('grid');
  const statsEl = document.getElementById('stats');
  const legendEl = document.getElementById('legend');
  let openPopover = null;

  function pad(n) { return String(n).padStart(2, '0'); }
  function dateKey(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }

  function closePopover() {
    if (openPopover) {
      openPopover.remove();
      openPopover = null;
    }
    const overlay = document.querySelector('.overlay:not(.theme-overlay)');
    if (overlay) overlay.remove();
  }

  function positionFloating(el, anchorEl, width, estHeight) {
    document.body.appendChild(el);
    const rect = anchorEl.getBoundingClientRect();
    let left = rect.left + window.scrollX + rect.width / 2 - width / 2;
    left = Math.max(10, Math.min(left, window.innerWidth - width - 10));
    let top = rect.bottom + window.scrollY + 6;
    if (rect.bottom + estHeight + 16 > window.innerHeight) {
      top = rect.top + window.scrollY - 6 - el.offsetHeight;
    }
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  }

  // ---- Day picker popover ----
  function openPicker(cell, key) {
    closePopover();
    closeThemeMenu();

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.addEventListener('click', closePopover);
    document.body.appendChild(overlay);

    const pop = document.createElement('div');
    pop.className = 'popover';

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-option';
      btn.innerHTML = `<span class="swatch" style="background:${cat.color}"></span>`;
      btn.appendChild(document.createTextNode(cat.label));
      btn.addEventListener('click', () => { data[key] = cat.id; save(); closePopover(); renderGrid(); });
      pop.appendChild(btn);
    });
    const clearBtn = document.createElement('button');
    clearBtn.className = 'opt-clear';
    clearBtn.textContent = '清除打卡';
    clearBtn.addEventListener('click', () => { delete data[key]; save(); closePopover(); renderGrid(); });
    pop.appendChild(clearBtn);

    const estHeight = 16 + (categories.length + 1) * 38;
    positionFloating(pop, cell, 136, estHeight);
    openPopover = pop;
  }

  // ---- Category editor popover ----
  function openCategoryEditor(pillEl, cat) {
    closePopover();
    closeThemeMenu();

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.addEventListener('click', closePopover);
    document.body.appendChild(overlay);

    const pop = document.createElement('div');
    pop.className = 'popover cat-editor';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'cat-label-input';
    input.value = cat.label;
    input.maxLength = 10;
    const commitLabel = () => {
      const val = input.value.trim();
      if (val) { cat.label = val; saveCategories(); renderLegend(); renderGrid(); }
      else { input.value = cat.label; }
    };
    input.addEventListener('blur', commitLabel);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
    pop.appendChild(input);

    const colorGrid = document.createElement('div');
    colorGrid.className = 'cat-color-grid';
    CATEGORY_COLORS.forEach(color => {
      const sw = document.createElement('button');
      sw.type = 'button';
      sw.className = 'cat-color-swatch' + (color.toLowerCase() === cat.color.toLowerCase() ? ' selected' : '');
      sw.style.background = color;
      sw.addEventListener('click', () => {
        cat.color = color;
        saveCategories();
        colorGrid.querySelectorAll('.cat-color-swatch').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
        renderLegend();
        renderGrid();
      });
      colorGrid.appendChild(sw);
    });
    pop.appendChild(colorGrid);

    if (categories.length > 1) {
      const footer = document.createElement('div');
      footer.className = 'cat-editor-footer';
      const delBtn = document.createElement('button');
      delBtn.className = 'cat-delete';
      delBtn.textContent = '删除这个类型';
      delBtn.addEventListener('click', async () => {
        const ok = await customConfirm(`删除「${cat.label}」后，已经打过这个类型卡的日期也会被清除，确定吗？`, true);
        if (!ok) return;
        categories = categories.filter(c => c.id !== cat.id);
        Object.keys(data).forEach(k => { if (data[k] === cat.id) delete data[k]; });
        saveCategories(); save();
        closePopover();
        renderLegend(); renderGrid();
      });
      footer.appendChild(delBtn);
      pop.appendChild(footer);
    }

    positionFloating(pop, pillEl, 196, 220);
    input.focus();
    openPopover = pop;
  }

  function addCategory() {
    const cat = { id: genId(), label: '新类型', color: nextColor() };
    categories.push(cat);
    saveCategories();
    renderLegend();
    renderGrid();
    const pillEl = legendEl.querySelector(`[data-cat-id="${cat.id}"]`);
    if (pillEl) openCategoryEditor(pillEl, cat);
  }

  function renderLegend() {
    legendEl.innerHTML = '';
    categories.forEach(cat => {
      const pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'legend-pill';
      pill.dataset.catId = cat.id;
      pill.title = '点击改名 / 换色';
      pill.innerHTML = `<span class="legend-dot" style="background:${cat.color}"></span>`;
      pill.appendChild(document.createTextNode(cat.label));
      pill.addEventListener('click', (e) => { e.stopPropagation(); openCategoryEditor(pill, cat); });
      legendEl.appendChild(pill);
    });
    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'legend-add';
    addBtn.textContent = '+ 添加';
    addBtn.addEventListener('click', (e) => { e.stopPropagation(); addCategory(); });
    legendEl.appendChild(addBtn);
  }

  function renderGrid() {
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    monthTitle.textContent = `${viewYear}年 ${monthNames[viewMonth]}`;

    grid.innerHTML = '';
    const firstDay = new Date(viewYear, viewMonth, 1);
    const startOffset = (firstDay.getDay() + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < startOffset; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    const counts = {};
    categories.forEach(c => counts[c.id] = 0);

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(viewYear, viewMonth, d);
      const catId = data[key];
      const cat = catId ? findCategory(catId) : null;
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'day-cell';

      if (cat) {
        cell.dataset.cat = cat.id;
        cell.style.setProperty('--cat-color', cat.color);
        counts[cat.id] = (counts[cat.id] || 0) + 1;
      }

      const isToday = viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate();
      if (isToday) cell.classList.add('today');

      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = d;
      cell.appendChild(num);

      if (cat) {
        const tag = document.createElement('span');
        tag.className = 'day-tag';
        tag.textContent = cat.label;
        cell.appendChild(tag);
      }

      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        if (openPopover && openPopover.dataset.key === key) { closePopover(); return; }
        openPicker(cell, key);
        if (openPopover) openPopover.dataset.key = key;
      });

      grid.appendChild(cell);
    }

    statsEl.innerHTML = '';
    categories.forEach(cat => {
      const stat = document.createElement('div');
      stat.className = 'stat';
      stat.innerHTML = `<span class="stat-num" style="color:${cat.color}">${counts[cat.id] || 0}</span><span class="stat-label">${cat.label}</span>`;
      statsEl.appendChild(stat);
    });
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    closePopover(); renderGrid();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    closePopover(); renderGrid();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    viewYear = today.getFullYear(); viewMonth = today.getMonth();
    closePopover(); renderGrid();
  });

  // Backup: export / import
  document.getElementById('exportBtn').addEventListener('click', () => {
    const payload = { data, categories, title: document.getElementById('titleText').textContent, kicker: document.getElementById('kickerText').textContent };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = `${today.getFullYear()}${pad(today.getMonth() + 1)}${pad(today.getDate())}`;
    a.href = url;
    a.download = `打卡备份-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  const importFile = document.getElementById('importFile');
  document.getElementById('importBtn').addEventListener('click', () => importFile.click());
  importFile.addEventListener('change', () => {
    const file = importFile.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const imported = JSON.parse(reader.result);
        if (typeof imported !== 'object' || imported === null || Array.isArray(imported)) throw new Error('格式不对');
        const merge = await customConfirm('导入备份会用备份文件覆盖当前的类型和打卡记录，确定导入吗？', true);
        if (merge) {
          if (imported.data) data = Object.assign({}, data, imported.data);
          if (Array.isArray(imported.categories) && imported.categories.length) categories = imported.categories;
          if (imported.title) { document.getElementById('titleText').textContent = imported.title; localStorage.setItem(TITLE_KEY, imported.title); }
          if (imported.kicker) { document.getElementById('kickerText').textContent = imported.kicker; localStorage.setItem(KICKER_KEY, imported.kicker); }
          save(); saveCategories();
          renderLegend(); renderGrid();
          showToast('导入完成');
        }
      } catch (err) {
        showToast('这个文件看起来不是有效的备份文件');
      }
      importFile.value = '';
    };
    reader.readAsText(file);
  });

  renderLegend();
  renderGrid();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
